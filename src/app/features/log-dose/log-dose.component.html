<div class="page-card">
  <h2>💊 Log a Dose</h2>
  <p class="page-sub">Record a medication you have taken.</p>

  <div *ngIf="errorMsg"    class="banner banner-error">{{ errorMsg }}</div>
  <div *ngIf="successMsg" class="banner banner-success">{{ successMsg }}</div>

  <div class="form-group">
    <label>Medication *</label>
    <select [(ngModel)]="selectedMedId" class="form-control">
      <option value="">— select a medication —</option>
      <option *ngFor="let m of medications" [value]="m.id">{{ displayName(m) }}</option>
    </select>
  </div>

  <!-- Thumbnail preview of selected med -->
  <div class="med-preview" *ngIf="selectedMed">
    <img [src]="'data:' + selectedMed.imageMimeType + ';base64,' + selectedMed.imageBase64" alt="med" class="thumb" />
    <div class="med-detail">
      <div class="med-name">{{ displayName(selectedMed) }}</div>
      <div class="med-ing">{{ selectedMed.analysis.activeIngredient }}</div>
    </div>
  </div>

  <div class="form-group">
    <label>Date &amp; Time Taken *</label>
    <input type="datetime-local" [(ngModel)]="dateTaken" class="form-control" />
  </div>

  <div class="form-group">
    <label>Notes (optional)</label>
    <textarea [(ngModel)]="notes" rows="3" placeholder="e.g. with food, felt drowsy after…" class="form-control"></textarea>
  </div>

  <button class="btn btn-primary btn-block" (click)="save()" [disabled]="saving">
    <span *ngIf="!saving">💾 Save Dose</span>
    <span *ngIf="saving">Saving…</span>
  </button>
</div>
