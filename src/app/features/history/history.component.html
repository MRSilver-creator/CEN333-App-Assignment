<div class="page-card">
  <h2>📋 Intake History</h2>

  <!-- 7-day chart -->
  <div class="chart-section" *ngIf="chartOptions">
    <canvasjs-chart [options]="chartOptions" [styles]="{width:'100%',height:'280px'}"></canvasjs-chart>
  </div>

  <!-- Search -->
  <div class="search-row">
    <input
      type="text"
      [(ngModel)]="searchQuery"
      placeholder="🔍 Filter by medication name…"
      class="search-input"
    />
    <span class="count-badge">{{ filtered.length }} dose(s)</span>
  </div>

  <!-- Table -->
  <div *ngIf="filtered.length === 0" class="empty-state">No doses logged yet.</div>

  <table *ngIf="filtered.length > 0" class="history-table">
    <thead>
      <tr>
        <th>Date &amp; Time</th>
        <th>Medication</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody>
      <tr
        *ngFor="let dose of filtered"
        [ngClass]="{ 'highlight-row': dose.id === mostRecentId }"
      >
        <td>{{ dose.dateTaken | date:'medium' }}</td>
        <td>{{ dose.medicationName }}</td>
        <td>{{ dose.notes || '—' }}</td>
      </tr>
    </tbody>
  </table>
</div>
