<!-- Disclaimer banner (Assignment requirement) -->
<div class="disclaimer">
  ⚠️ <strong>Educational use only.</strong> PillSnap is not a diagnostic or medical advice tool.
  Always verify with a pharmacist or doctor.
</div>

<!-- Top navigation -->
<nav class="top-nav">
  <!-- University logo -->
  <a class="nav-logo" routerLink="/">
    <img
      src="assets/university-logo.png"
      alt="University Logo"
      class="uni-logo"
      onerror="this.style.display='none'"
    />
    <span class="logo-text">💊 PillSnap</span>
  </a>

  <div class="nav-links">
    <a routerLink="/"         routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
    <a routerLink="/identify" routerLinkActive="active">Identify</a>
    <a routerLink="/library"  routerLinkActive="active">Library</a>
    <a routerLink="/log-dose" routerLinkActive="active">Log Dose</a>
    <a routerLink="/history"  routerLinkActive="active">History</a>
  </div>
</nav>

<main class="main-content">
  <router-outlet />
</main>

<!-- Footer -->
<footer class="footer">
  <div class="footer-inner">
    <img
      src="assets/university-logo.png"
      alt="University Logo"
      class="footer-logo"
      onerror="this.style.display='none'"
    />
    <div class="footer-text">
      <span class="footer-credit">Designed by: <strong>Wassim Saad</strong></span>
      <span class="footer-course">CEN333 / BME433 &mdash; Cross-Platform Mobile Application Development</span>
    </div>
  </div>
</footer>
